"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

# Two-line layout: path + vcs info on line 1, prompt character on line 2.
# $fill pushes cmd_duration to the right side of the terminal.
format = """
$directory${custom.jj}${custom.git_branch}$fill$python$nodejs$rust$cmd_duration
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
min_time = 1000
format = "[$duration](bold yellow) "

[directory]
truncation_length = 4
truncate_to_repo = true

[package]
disabled = true

[gcloud]
disabled = true

[docker_context]
disabled = true

# custom module for jj status
[custom.jj]
description = "The current jj status"
when = "jj root --ignore-working-copy 2>/dev/null"
symbol = "🥋 "
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "|",
    concat(
      if(conflict, "💥"),
      if(divergent, "🚧"),
      if(hidden, "👻"),
      if(immutable, "🔒"),
    ),
    label("bold green", separate(" ",
      if(empty, "(empty)"),
      coalesce(
        truncate_end(29, description.first_line(), "…"),
        "(no description set)",
      ),
    )),
  )
'
'''

# disable all git modules (jj handles its own display; git_status shows wrong
# info in jj repos since they have a .git dir)
[git_status]
disabled = true

[git_state]
disabled = true

[git_commit]
disabled = true

[git_metrics]
disabled = true

[git_branch]
disabled = true

# show git_branch only in git repos that aren't also jj repos
[custom.git_branch]
when = "git rev-parse --git-dir 2>/dev/null && ! jj root --ignore-working-copy 2>/dev/null"
command = "starship module git_branch"
description = "Only show git_branch if we're not in a jj repo"
